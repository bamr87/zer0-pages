[pytest]
DJANGO_SETTINGS_MODULE = zer0pages.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --strict-markers
    --tb=short
markers =
    e2e: End-to-end tests
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
    ai: AI service tests
    github: GitHub integration tests
    jekyll: Jekyll build tests

