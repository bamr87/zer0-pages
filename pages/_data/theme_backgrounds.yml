      accent: "#3a86ff"
    gradient: "assets/backgrounds/gradients/neon.svg"
    pattern: "assets/backgrounds/patterns/neon.svg"
    noise: "assets/backgrounds/noise/neon.svg"

  mint:
    label: "Mint"
    colors:
      primary: "#2d6a4f"
      secondary: "#52b788"
      accent: "#95d5b2"
    gradient: "assets/backgrounds/gradients/mint.svg"
